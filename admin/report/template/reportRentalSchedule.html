{% extends "template-html.html" %}
{% block JS %}   
<script type="text/javascript">  
    jQuery(document).ready(function(){  
	     $( "[name=trStartDate], [name=trEndDate]" ).change(function() { 
            var trStartDate = Date.parse(convertDateToStandartFormat($("[name=trStartDate]").val()));
            var trEndDate = Date.parse(convertDateToStandartFormat($("[name=trEndDate]").val()));
               
            if (trStartDate > trEndDate) 
                $("[name=trEndDate]").val($("[name=trStartDate]").val()); 
            
		});
	});
    
</script>
 <style>
      .timesheet-table thead th{border:1px solid #4ca6f3; } 
      .timesheet-table tr td {background-color:#fff; border:1px solid #dedede; } 
      .timesheet-table tr:nth-child(2n+2) td {background-color:#efefef; } 
      .timesheet-table tr.subtotal td {background-color:#fff; border:0px;  } 
 </style>
{% endblock %} 
{% block filter %}
 <div> 
    <div class="form-group">
        <label class="col-xs-12 control-label" >Periode</label>
        <div class="col-xs-6" style="padding-right:5px;"> {{ inputStartDate|raw }} </div>
        <div class="col-xs-6" style="padding-left:5px;"> {{ inputEndDate|raw }} </div>
    </div> 
     <div class="form-group">
        <label class="col-xs-12 control-label" >{{ LANG.itemName }}</label>
        <div class="col-xs-12"> {{ inputSelItem|raw }} </div> 
    </div> 
     <div class="form-group">
        <label class="col-xs-12 control-label" >{{ LANG.soCode }}</label>
        <div class="col-xs-12"> {{ inputSalesCode|raw }} </div>
    </div>
 </div>	 
{% endblock %}
{% block reportContent %}
 <table class="main-table html-report">    
    <tbody></tbody>
</table>
{% endblock %}
