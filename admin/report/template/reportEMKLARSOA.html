{% extends "template.html" %}
{% set arrTruckingGroup = [COMPANY_TYPE.trucking, COMPANY_TYPE.forwarding] %} 

{% block JS %}
 
<script type="text/javascript">
    
    function updateCustomer(obj){ 
           var templateKey = $("[name=hidTemplateCustomerKey]").val();
           $.ajax({
                type: "GET",
                url:  "../ajax-template-customer.php", 
                data: "action=getDetailById&pkey=" + templateKey,  
            }).done(function( data ) {  
                 data = JSON.parse(data) ;   

                 $("[name='selCustomer[]']:checked").click(); 
                 for(i=0;i<data.length;i++) 
                     $("[name='selCustomer[]'][value="+data[i].customerkey+"]:not(:checked)").click();

            }); 
     } 
    

</script>
{% endblock %}
{% block filter %}
 <div > 
    <div class="form-group">
        <label class="col-xs-12 control-label" >Gudang</label>
        <div class="col-xs-12"> {{ inputSelWarehouse|raw }} </div>
    </div>  
    <div class="form-group">
        <label class="col-xs-12 control-label" >Pelanggan</label>
        <div class="col-xs-12" style="margin-bottom: 0.2em"> {{ inputTemplateCustomer|raw }} </div>
        <div class="col-xs-12"> {{ inputSelCustomer|raw }} </div>
    </div>

{% endblock %}
