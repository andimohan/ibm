{% block filter %}

 <div>   
    <div class="form-group">
        <label class="col-xs-12 control-label" >{{ LANG.code }}</label>
        <div class="col-xs-12">  {{ inputCodeAdvance|raw }} </div>
    </div>
	 
    <div class="form-group">
        <label class="col-xs-12 control-label" >{{ LANG.cashAdvance }}</label>
