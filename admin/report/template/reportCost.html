{% extends "template-html.html" %}
{% block JS %}  
<script type="text/javascript"> 
        
    function expandLevel(obj){  	 
            var liObj = obj.closest("tr");
            var id = liObj.attr("relId");   

             if (liObj.hasClass("expand")){
                $( "." + id).removeClass("expand").hide();
                liObj.removeClass("expand");
             }else{
                $( "[relParentId="+id+"]").show();
                liObj.addClass("expand");
             }
        } 
    
</script>
{% endblock %}
