{% extends "template.html" %}
{% block JS %}
{% endblock %}
{% block filter %}
 <div>    
    <div class="form-group">
        <label class="col-xs-12 control-label" >{{ LANG.code }}</label>
        <div class="col-xs-12"> {{ inputContractCode|raw }} </div>
    </div>
    <div class="form-group mnv-date-range">
        <label class="col-xs-12 control-label">Periode</label>
        <div class="col-xs-6" style="padding-right:5px;"> {{ inputStartDate|raw }} </div>
        <div class="col-xs-6" style="padding-left:5px;"> {{ inputEndDate|raw }} </div>
    </div>
    <div class="form-group">
        <label class="col-xs-12 control-label">{{ LANG.customer }}</label>
        <div class="col-xs-12"> {{ inputSelCustomer|raw }} </div>
    </div>
    <div class="form-group">
        <label class="col-xs-12 control-label">{{ LANG.service}}</label>
        <div class="col-xs-12"> {{ inputSelService|raw }} </div>
    </div>
    <div class="form-group">
        <label class="col-xs-12 control-label">{{ LANG.status }}</label>
        <div class="col-xs-12"> {{ inputSelStatus|raw }} </div>
    </div>
 </div>	 
{% endblock %}
