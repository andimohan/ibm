{% extends "template.html" %} 
{% block filter %}
 <div> 
    <div class="form-group">
        <label class="col-xs-12 control-label" >{{ LANG.code }}</label>
        <div class="col-xs-12">{{ inputCode|raw }}</div>
    </div> 
    <div class="form-group  mnv-date-range">
        <label class="col-xs-12 control-label" >{{ LANG.period }}</label>
        <div class="col-xs-6" style="padding-right:5px;"> {{ inputStartDate|raw }} </div>
        <div class="col-xs-6" style="padding-left:5px;"> {{ inputEndDate|raw }} </div>
    </div>
    <div class="form-group">
        <label class="col-xs-12 control-label" >{{ LANG.warehouse }}</label>
        <div class="col-xs-12">{{ inputSelWarehouse|raw }}</div>
    </div> 
    <div class="form-group">
        <label class="col-xs-12 control-label" >{{ LANG.customer }}</label>
        <div class="col-xs-12">{{ inputSelCustomer|raw }}</div>
    </div> 
    <div class="form-group">
        <label class="col-xs-12 control-label" >{{ LANG.consignee }}</label>
        <div class="col-xs-12">{{ inputSelConsignee|raw }}</div>
    </div> 
    <div class="form-group">
        <label class="col-xs-12 control-label" >{{ LANG.status }}</label>
        <div class="col-xs-12">{{ inputSelStatus|raw }}</div>
    </div>  
    <div class="form-group" style="margin-bottom:0">
        <label class="col-xs-12 control-label" >{{ LANG.others }}</label> 
    </div>    
    <div class="form-group">  
        <div class="col-xs-12"> {{ inputShowDetail|raw }} <span style="margin-left: 5px">{{ LANG.showDetail }}</span></div>
    </div> 
    
 </div>	 
{% endblock %}
