{% extends "template.html" %}
{% block JS %}
<script type="text/javascript"> 
	jQuery(document).ready(function(){ 
         
     /*   
        setAutoComplete('filterForm', {objName:'customerName', objValue :'hidCustomerKey', url : 'ajax-customer.php?action=searchData' });
        setAutoComplete('filterForm', {objName:'consigneeName', objValue :'hidConsigneeKey', url : 'ajax-consignee.php?action=searchData' }); 
     */   
        $( "[name=trStartStuffingDateTime], [name=trEndStuffingDateTime]" ).change(function() { 
            var trStartDate = Date.parse(convertDateToStandartFormat($("[name=trStartStuffingDateTime]").val()));
            var trEndDate = Date.parse(convertDateToStandartFormat($("[name=trEndStuffingDateTime]").val()));
               
            if (trStartDate > trEndDate) 
                $("[name=trEndStuffingDateTime]").val($("[name=trStartStuffingDateTime]").val()); 
            
		});
         
	}); 
</script>
{% endblock %}
