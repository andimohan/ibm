{% block filter %}
<div>
    <div class="form-group">
        <label class="col-xs-12 control-label">{{ LANG.code }}</label>
        <div class="col-xs-12">
            {{ inputCode|raw }}
        </div>
    </div>
 	<div class="form-group  mnv-date-range">
        <label class="col-xs-12 control-label" >Periode</label>

        <div class="col-xs-6" style="padding-left:5px;"> {{ inputEndDate|raw }} </div>
    </div>
    <div class="form-group">
        <label class="col-xs-12 control-label">{{ LANG.language }}</label>
        <div class="col-xs-12">
            {{ inputSelLanguage|raw }}
        </div>
    </div>
    <div class="form-group">
        <label class="col-xs-12 control-label">{{ LANG.meetingType }}</label>
        <div class="col-xs-12">
            {{ inputSelOnlineOffline|raw }}
        </div>
    </div>
    <div class="form-group">
        <label class="col-xs-12 control-label">{{ LANG.meetingPoint }}</label>
        <div class="col-xs-12">
            {{ inputSelMeetingPoint|raw }}
        </div>
    </div>
    <div class="form-group">

            {{ inputSelStatus|raw }}
        </div>
    </div>
