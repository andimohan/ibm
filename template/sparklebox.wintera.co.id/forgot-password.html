{% set TEMPLATE_JS_PAGE_PATH = TEMPLATE_JS_PAGE_PATH ~ 'formJS-1.3/' %}
<script type="text/javascript" src="{{ TEMPLATE_JS_PATH }}jquery-3.3.1.min.js"></script>
<script type="text/javascript" src="{{ TEMPLATE_JS_PATH }}bootstrap.min.js"></script>
<script type="text/javascript" src="{{ TEMPLATE_JS_PATH }}critical-js.min.js"></script>
<script type="text/javascript" src="{{ TEMPLATE_JS_PAGE_PATH }}forgot-password.min.js"></script> 
<script type="text/javascript">
jQuery(document).ready(function(){   
 var opt = new Array();    
 var errMsg = new Array();  
 var lang = new Array();     

 errMsg['email'] = {{ ERRORMSG.email|json_encode()|raw }}; 
 lang['resetPasswordSuccessMessage'] = "{{ LANG.resetPasswordSuccessMessage|raw }}";    

 opt['errMsg'] = errMsg;
 opt['lang'] = lang;

 var forgotPassword = new ForgotPassword(opt);
 forgotPassword.loadOnReady(); 
}); 
</script> 
<script type=text/javascript src='https://www.google.com/recaptcha/api.js'></script>
<link rel="stylesheet" type="text/css" href="{{ TEMPLATE_CSS_PATH }}webStyle.1.27.min.css">
<link rel="stylesheet" type="text/css" href="{{ TEMPLATE_CSS_PATH }}bootstrap.min.css"> 
<link rel="stylesheet" type="text/css" href="{{ TEMPLATE_CSS_PATH }}mmenu.min.css">


<div class="content-panel">
    <form id="form-forgot-password" method="post" class="form-horizontal form-default prevent-form-submit flex justify-content-center flex-direction-column"  action="/ajax-member.php">
        <div class="notification-msg"></div>
        <div style="clear:both;height:1em"></div>
        {{ inputHidAction|raw }}
   
       <div class="form-group">
            <label class="col-sm-12 control-label" style="margin-bottom: .5em">{{ LANG.forgotPasswordMessage }}</label>
            <div class="col-sm-12">{{ inputEmail|raw }}</div>
        </div>
        
       <div style="text-align: center"><div class="g-recaptcha" data-sitekey="{{ settings.reCaptchaSiteKey }}"></div></div>

        <div class="section-break-2"></div>
        
        <div class="flex justify-content-between" style="width: 100%; padding-right: 1em;">
            <div><button class="btn close-popup">{{ LANG.cancel }}</button></div>
            <div>{{ btnSubmit|raw }}</div>
        </div>
        
        <div class="section-break-1"></div>
        
        
    </form>
</div>
